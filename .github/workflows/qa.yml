name: QA

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run API test suite
        run: |
          pytest tests -m "not frontend" -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --alluredir=allure-results

      - name: Start FastAPI server
        run: |
          python -m uvicorn main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &

      - name: Wait for server to be ready
        run: |
          python - <<'PY'
          import sys
          import time
          import urllib.request

          url = "http://127.0.0.1:8000"
          last_error = None

          for _ in range(30):
              try:
                  with urllib.request.urlopen(url, timeout=2):
                      print(f"Server ready at {url}")
                      sys.exit(0)
              except Exception as exc:
                  last_error = exc
                  time.sleep(1)

          raise SystemExit(f"Server did not become ready: {last_error}")
          PY

      - name: Run frontend smoke test
        env:
          APP_URL: http://127.0.0.1:8000
        run: |
          pytest tests/test_frontend_smoke.py -v --alluredir=allure-results

      - name: Generate Allure HTML report
        if: always()
        run: |
          if [ -d allure-results ] && [ "$(find allure-results -mindepth 1 -maxdepth 1 | wc -l)" -gt 0 ]; then
            allure generate allure-results --clean -o allure-report
          else
            echo "allure-results is empty; skipping HTML generation"
          fi

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: warn

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: warn

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: warn

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uvicorn-log
          path: uvicorn.log
          if-no-files-found: warn
